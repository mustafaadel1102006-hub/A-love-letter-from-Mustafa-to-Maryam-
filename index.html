<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قصة حبنا ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec, #ffb3c6);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            color: #4a001f;
            position: relative;
        }

        .heart-bg {
            position: fixed;
            top: -10vh;
            font-size: 20px;
            animation: fall linear infinite;
            z-index: 1;
            opacity: 0.6;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) translateX(20px) rotate(360deg);
            }
        }

        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffb3c6, #ffe5ec);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 0.5s ease-in-out;
        }

        .lock-container {
            background: white;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 71, 126, 0.2);
            text-align: center;
            width: 85%;
            max-width: 380px;
            border: 2px solid #ff477e;
        }

        .lock-container .icon {
            font-size: 50px;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .lock-container h2 {
            font-size: 20px;
            color: #ff477e;
            margin-bottom: 20px;
        }

        .lock-container input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffb3c6;
            border-radius: 25px;
            text-align: center;
            font-size: 18px;
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
        }

        .lock-container input:focus {
            border-color: #ff477e;
            box-shadow: 0 0 8px rgba(255, 71, 126, 0.3);
        }

        .lock-container button {
            background: #ff477e;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 71, 126, 0.3);
            transition: 0.2s;
        }

        .lock-container button:active {
            transform: scale(0.98);
        }

        #error-msg {
            color: #d90429;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 450px;
            z-index: 2;
            border: 2px solid #ff85a2;
            display: none;
        }

        .names {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ff0a54;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ff477e;
        }

        .timer-title {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .countdown {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }

        .time-box {
            background: #ff477e;
            color: white;
            padding: 10px;
            border-radius: 12px;
            width: 70px;
            box-shadow: 0 4px 10px rgba(255, 71, 126, 0.3);
        }

        .time-box span {
            display: block;
            font-size: 22px;
            font-weight: bold;
        }

        .time-box label {
            font-size: 12px;
            opacity: 0.9;
        }

        .love-quote {
            font-style: italic;
            margin-top: 25px;
            font-size: 15px;
            line-height: 1.6;
            color: #70002b;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-container">
            <div class="icon">❤️</div>
            <h2>تطبيق خاص بـ مصطفى وعروسته</h2>
            <input type="password" id="password-input" placeholder="ادخلي تاريخ ميلادك المميز...">
            <button id="submit-btn">دخول ✨</button>
            <p id="error-msg">كلمة السر مش مظبوطة يا عروستي! ركزي تاني كدهِ 🤔</p>
        </div>
    </div>

    <div class="container" id="main-content">
        <div class="names">مصطفى & مريم ❤️</div>
        <h1>كل ثانية معاكي هي العمر كله</h1>
        
        <div class="timer-title">الوقت المتبقي على يوم فرحنا المنتظر:</div>
        
        <div class="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <label>يوم</label>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <label>ساعة</label>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <label>دقيقة</label>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <label>ثانية</label>
            </div>
        </div>

        <p class="love-quote">"وإني أدعو الله في كل ليلة أن يجمعنا تحت سقف واحد قريباً، لتكوني لي موطناً وأكون لكي أماناً."</p>
    </div>

    <script>
        const correctPassword = "2222006"; 
        const weddingDate = new Date(2027, 5, 1, 18, 0, 0).getTime(); 

        function checkPassword() {
            const userInput = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-msg');
            const lockScreen = document.getElementById('lock-screen');
            const mainContent = document.getElementById('main-content');

            if (userInput === correctPassword) {
                lockScreen.style.opacity = '0';
                setTimeout(() => {
                    lockScreen.style.display = 'none';
                    mainContent.style.display = 'block';
                    updateCountdown();
                    setInterval(updateCountdown, 1000);
                    setInterval(createHeart, 400);
                }, 500);
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('password-input').value = '';
            }
        }

        document.getElementById('submit-btn').addEventListener('click', checkPassword);

        document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = weddingDate - now;

            if (difference < 0) {
                document.querySelector('.timer-title').innerText = "لقد جمعنا الله معاً! ❤️";
                document.querySelector('.countdown').style.display = 'none';
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = days < 10 ? '0' + days : days;
            document.getElementById('hours').innerText = hours < 10 ? '0' + hours : hours;
            document.getElementById('minutes').innerText = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('seconds').innerText = seconds < 10 ? '0' + seconds : seconds;
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    </script>
</body>
</html>
